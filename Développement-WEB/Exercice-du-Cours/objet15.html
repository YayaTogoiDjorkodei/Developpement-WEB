<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Resolutuon </h1>
    <form name="fo">
        <label for="texte">Nomcomplet:</label>
        <input type="text" name="text" id="texte">
        <br>
        <label for="nom">Nom:</label>
        <input type="text" name="nom" id="nom">
        <br>
        <label for="prenom">Prenom:</label>
        <input type="text" name="prenom" id="prenom">
        <br>
        <input type="button" value="Envoyer" onclick="f()">
    </form>
    <script>
        function f(){
            let s=document.fo.texte.value;
            document.fo.nom.value=s.toUpperCase();
            document.fo.prenom.value=s.toLowerCase();        
        }
    </script>
</body>
</html>
