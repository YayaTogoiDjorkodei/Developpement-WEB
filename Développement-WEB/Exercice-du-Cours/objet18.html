<head>

<body>
   <h1>Resolutuon:</h1> 
   <form name="fo">
    <label for="mots">Mots:</label>
    <input type="text" name="mots" id="mots">
    <br>
    <label for="resultat">resultat:</label>
    <input type="text" name="resultat" id="resultat">
    <br>
    <input type="button" value="Envoyer" onclick="f()">
   </form>
   <script>
    function f(){
        let s=document.fo.mots.value;
        let co=-1;
        for (let i = 0; i < s.length; i++) {
            if(s[i]==s[s.length-i-1])
            co=1;
        }
        if(co==1)
        document.fo.resultat.value=s+" est palindrom";
    else
    document.fo.resultat.value=s+" n'est pas palindrom";
        }
   </script>
