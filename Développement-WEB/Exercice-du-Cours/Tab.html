        <input type="text" name="p" id="p">
        <input type="button" value="Envoer" onclick="f()">
    </form>
    <script>
        function f(){
            let a=document.fo.ch.value;
            b=a.split(" ");
            let co=-1;
            for (let i = 0; i <= b.length-1; i++) {
                if(b[i]=="javascripte"){
                    co=1;
                   }
            }
            if(co==1){
                document.fo.n.value="existe";
            }
            else{
                document.fo.p.value=" introuvable";
            }
        }
    </script>
