<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <h1>ajouter</h1>
    <form name="fo">
        <input type="text" name="n" id="n">
        <input type="button" value="ajouter" name="ajouter" onclick="f()">
    </form>
    <ul id="list"></ul>
    <script>
        function f(){
        let list=document.getElementById("list");
        let li=document.createElement("li");
        li.innerHTML=document.getElementById("n").value;
        let br=document.createElement("button");
        br.innerHTML="suprimer";
        //br.onclick=function(){
          //  li.remove();
        //}
        br.addEventListener("click",function(){
            li.remove();
        });
        li.appendChild(br);
        list.appendChild(li);
        document.fo.n.value="";
        }
    </script>
</body>
