<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(113, 85, 85);
        }
        .heur{
            text-align: center;
            padding-top: 100;
             color: white;
            font-size: 60px;
            font-weight: bold;
            padding: 20px 40px;
            border: 3px solid white;
            border-radius: 15px;
            background: #333;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        #Bouton{
            text-align: center;
            font-size: 60px;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <form name="fo">
        <div class="heur" id="h">0:0:0</div>
        <div id="Bouton"><input type="button" value="Executer" onclick="f()"></div>
    </form>
    <script>
        function f(){
            setTimeout("f()",1001);
            let str="";
            var d=new Date();
            var h=d.getHours();
            var m=d.getMinutes();
            var s=d.getSeconds();
            if(h<10){
                str=str+"0"+h+":";
            }
            else{
                str=str+h+":";
            }
             if(m<10){
                str=str+"0"+m+":";
            }
            else{
                str=str+m+":";
            }
             if(s<10){
                str=str+"0"+h;
            }
            else{
                str=str+s;
            }
            document.getElementById("h").innerHTML=str;;
        }
    </script>
</body>
</html>
