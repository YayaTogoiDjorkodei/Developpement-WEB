<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patisserie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">Patisserie</div>
    <nav>
        <ul>
            <li>Home</li>
            <li>Menu</li>
            <li>Cakes</li>
            <li>Contact</li>
        </ul>
    </nav>
</header>

<!-- HERO SECTION -->
<section class="hero">
    <div class="hero-text">
        <h1>Delight in every bite!</h1>
        <button>ORDER NOW</button>
    </div>
    <div class="hero-images">
        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587" alt="">
        <img src="https://images.unsplash.com/photo-1559628233-100c798642d4" alt="">
    </div>
</section>

<!-- SIGNATURE SECTION -->
<section class="signature">
    <h2>Signature</h2>

    <div class="cards">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1542826438-bd32f43d626f" alt="">
            <h3>Custom Cakes</h3>
            <p>Soft and rich taste experience</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511381939415-e44015466834" alt="">
            <h3>Macarons</h3>
            <p>Sweet and colorful delights</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505253213348-9d7f3c3b3a9c" alt="">
            <h3>Cupcake Collections</h3>
            <p>Delicious creamy cupcakes</p>
        </div>
    </div>
</section>

<!-- PROMOTION -->
<section class="promo">
    <div class="promo-text">
        <h2>Holiday Collection</h2>
        <p class="discount">20% OFF</p>
        <button>Order Today</button>
    </div>

    <div class="promo-img">
        <img src="https://images.unsplash.com/photo-1486427944299-d1955d23e34d" alt="" height="200" width="200
        ">
    </div>
</section>

<!-- FOOTER -->
<footer>
    <div class="newsletter">
        <h3>Newsletter</h3>
        <input type="email" placeholder="Enter your email">
        <button>Sign up</button>
    </div>

    <div class="socials">
        <p>Instagram | Twitter | Facebook</p>
    </div>
</footer>

</body>
</html>
