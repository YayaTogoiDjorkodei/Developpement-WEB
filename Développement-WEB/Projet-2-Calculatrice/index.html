<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculatrice</title>

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #222;
    font-family: Arial;
}

.calculatrice {
    background: #333;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

#ecran {
    width: 100%;
    height: 50px;
    font-size: 24px;
    margin-bottom: 10px;
    text-align: right;
    padding: 5px;
}

.boutons {
    display: grid;
    grid-template-columns: repeat(4, 60px);
    gap: 10px;
}

button {
    height: 60px;
    font-size: 20px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background: #555;
    color: white;
}

button:hover {
    background: #777;
}

.egal {
    background: orange;
}
</style>
</head>

<body>

<div class="calculatrice">

    <input type="text" id="ecran" disabled>

    <div class="boutons">
        <button onclick="ajouter('7')">7</button>
        <button onclick="ajouter('8')">8</button>
        <button onclick="ajouter('9')">9</button>
        <button onclick="ajouter('/')">/</button>

        <button onclick="ajouter('4')">4</button>
        <button onclick="ajouter('5')">5</button>
        <button onclick="ajouter('6')">6</button>
        <button onclick="ajouter('*')">*</button>

        <button onclick="ajouter('1')">1</button>
        <button onclick="ajouter('2')">2</button>
        <button onclick="ajouter('3')">3</button>
        <button onclick="ajouter('-')">-</button>

        <button onclick="ajouter('0')">0</button>
        <button onclick="ajouter('.')">.</button>
        <button onclick="calculer()" class="egal">=</button>
        <button onclick="ajouter('+')">+</button>

        <button onclick="effacer()" style="grid-column: span 4; background:rgb(213, 144, 144);">
            C
        </button>
    </div>

</div>

<script>
let ecran = document.getElementById("ecran");


function ajouter(valeur) {
    ecran.value += valeur;
}


function calculer() {
    try {
        ecran.value = eval(ecran.value);
    } catch {
        ecran.value = "Erreur";
    }
}


function effacer() {
    ecran.value = "";
}
</script>

</body>
</html>
