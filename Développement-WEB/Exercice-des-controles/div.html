<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="div.css">
</head>
<body>
     <div class="container" id="container"></div>
        <br>
        <input type="button" value="ajouter Div" onclick="ajouter()">
        <button onclick="suprimer()">suprimer</button>
</body>
<script>
    
        let c = document.getElementById("container");

        function ajouter(){
        let b = document.createElement("div");
        b.innerText = "nouvelle div";
        b.className = "box";
        c.appendChild(b);

        }
        function suprimer(){
            let a=document.getElementsByClassName("box");
                console.log(a);
            a[a.length-1].remove();
        }
</script>
</html>
